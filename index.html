<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiJOE Hello World</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Hello World</h1>
      <p>Bienvenido a la galería básica de imágenes de GIJOE.</p>
    </header>

    <section class="gallery">
      <figure>
        <img src="images/gijoe1.jpg" alt="GIJOE 1">
        <figcaption>GIJOE 1</figcaption>
      </figure>
      <figure>
        <img src="images/gijoe2.jpg" alt="GIJOE 2">
        <figcaption>GIJOE 2</figcaption>
      </figure>
      <figure>
        <img src="images/gijoe3.jpg" alt="GIJOE 3">
        <figcaption>GIJOE 3</figcaption>
      </figure>
    </section>

    <section class="gallery">
      <h2>Figuras de GIJOE desde DB_MAUI</h2>
      <figure>
        <img src="DB_MAUI/ImageBlister1_0.gif" alt="Storm Shadow (v3)">
        <figcaption>Storm Shadow (v3) - Blíster</figcaption>
      </figure>
      <figure>
        <img src="DB_MAUI/ImageBody_0.gif" alt="Storm Shadow (v3)">
        <figcaption>Storm Shadow (v3) - Cuerpo</figcaption>
      </figure>
      <figure>
        <img src="DB_MAUI/ImageBlister1_1.gif" alt="Avalanche (v1)">
        <figcaption>Avalanche (v1) - Blíster</figcaption>
      </figure>
      <figure>
        <img src="DB_MAUI/ImageBody_1.gif" alt="Avalanche (v1)">
        <figcaption>Avalanche (v1) - Cuerpo</figcaption>
      </figure>
      <figure>
        <img src="DB_MAUI/ImageBlister1_2.gif" alt="Blizzard (v1)">
        <figcaption>Blizzard (v1) - Blíster</figcaption>
      </figure>
      <figure>
        <img src="DB_MAUI/ImageBody_2.gif" alt="Blizzard (v1)">
        <figcaption>Blizzard (v1) - Cuerpo</figcaption>
      </figure>
    </section>

    <footer>
      <p>Coloca tus imágenes de GIJOE en la carpeta <strong>images/</strong> con nombres como <code>gijoe1.jpg</code>, <code>gijoe2.jpg</code> y <code>gijoe3.jpg</code>.</p>
    </footer>
  </main>
</body>
</html>
